name: Fast Regressions

on:
  pull_request:
    branches-ignore:
      - main
    paths-ignore:
      - "documentation/**"
  workflow_dispatch:
    inputs:
      upload-artifacts:
        description: 'Upload artifacts (1=yes, 0=no)'
        required: false
        default: '0'
      no-clean:
        description: 'Pass --no-clean to regression scripts'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

defaults:
  run:
    shell: bash


concurrency:
  group: minimal-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  upload-artifacts: ${{ inputs.upload-artifacts || '0' }}
  NO_CLEAN_ARG: ${{ inputs['no-clean'] && '--no-clean' || '' }}
  report-dir: test-reports
  storage-url: "${{secrets.CI_STORAGE_URL}}"
  storage-user: "${{secrets.CI_STORAGE_USER}}"
  storage-token: "${{secrets.CI_STORAGE_TOKEN}}"
  host_jobs: $J
  host_threads: $OMP_NUM_THREADS
  dist-dir: panda_dist
  CI_COMPILERS: clang-4.0,clang-6.0,clang-7,clang-11,clang-13,clang-16,clang-19

jobs:
  build:
    uses: ./.github/workflows/build-panda.yml
    with:
      package-name: bambu-minimal
      compilers: clang-4.0,clang-6.0,clang-7,clang-11,clang-13,clang-16,clang-19
      package-compilers: false
    secrets: inherit

  cppcheck:
    needs: [build]
    if: ${{ needs.build.outputs.compilation-db != '' }}
    runs-on: [self-hosted]
    env:
      cppcheck-dir: cppcheck-report
      cppcheck-args: --enable=all --force --suppress=missingIncludeSystem --suppress=unknownMacro --inline-suppr -i ext
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: "true"
      - name: Download compilation database
        uses: ./.github/actions/storage-download
        with:
          name: ${{needs.build.outputs.compilation-db}}
          storage-url: ${{env.storage-url}}
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Env setup
        id: host
        shell: bash
        run: |
          echo "jobs=${{env.host_jobs}}" >> $GITHUB_OUTPUT
          echo "threads=${{env.host_threads}}" >> $GITHUB_OUTPUT
          cat > docker_exec.sh << EOF
          #!/bin/bash -e
          # Remove generated sources from compilation database
          python3 -c 'import json, sys; print(json.dumps([obj for obj in json.load(open(sys.argv[1], "r")) if not obj.get("file", "").startswith(sys.argv[2])], indent=2))' compilation_db/build/compile_commands.json /github/workspace/build > compilation_db/build/compile_commands.filtered.json
          mkdir -p ${{env.cppcheck-dir}}
          cppcheck ${{env.cppcheck-args}} --project="compilation_db/build/compile_commands.filtered.json" --xml --xml-version=2 --output-file="${{env.cppcheck-dir}}/cppcheck.xml" "\$@"
          cppcheck-htmlreport --source-dir=. --title=Bambu --file="${{env.cppcheck-dir}}/cppcheck.xml" --report-dir="${{env.cppcheck-dir}}"
          EOF
          chmod +x docker_exec.sh
      - name: Run CPPCheck
        uses: ./.github/actions/codechecks-runner
        with:
          command: ./docker_exec.sh -j${{env.host_jobs}}
          jobs: ${{steps.host.outputs.jobs}}
          threads: ${{steps.host.outputs.threads}}
      - name: Upload CPPCheck HTML report
        if: ${{ env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: CPPCheck-report
          path: ${{env.cppcheck-dir}}
      - name: Check for errors
        id: error
        shell: bash
        run: |
          echo "count=$(grep -o -i severity=\"error\" ${{env.cppcheck-dir}}/cppcheck.xml | wc -l)" >> $GITHUB_OUTPUT
      - name: CPPCheck found some errors
        uses: actions/github-script@v8
        if: ${{ steps.error.outputs.count > 0 }}
        with:
          script: core.setFailed('CPPCheck detected ${{steps.error.outputs.count}} errors.')

  changes:
    permissions:
      pull-requests: read
      contents: read
    runs-on: [self-hosted]
    outputs:
      softfloat: ${{ steps.filter.outputs.softfloat }}
      libm: ${{ steps.filter.outputs.libm }}
    steps:
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            softfloat: ['etc/libbambu/bambu_macros.h', 'etc/libbambu/softfloat/**']
            libm: ['etc/libbambu/bambu_macros.h', 'etc/libbambu/libm/**', 'etc/libbambu/softfloat/**']

  specific-test:
    needs: [build]
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        id: ["", "2", "3", "4", "5", "6", "7"]
    env:
      args: -c=--simulator=VERILATOR -c=--parallel-backend=2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch Bambu specific test ${{matrix.id}}
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          ./panda_regressions/hls/bambu_specific_test${{matrix.id}}.sh ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: bambu_specific_test${{matrix.id}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: bambu_specific_test${{matrix.id}}
          path: ${{env.report-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  interface-test:
    needs: [build]
    if: ${{!cancelled() && needs.build.result == 'success' }}
    runs-on: [self-hosted, mentor]
    strategy:
      fail-fast: false
      matrix:
        simulator: [MODELSIM, VERILATOR]
    env:
      script: ./panda_regressions/hls/bambu_interface_test.sh
      args: -c=--simulator=${{matrix.simulator}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch Bambu interface test ${{matrix.simulator}}
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          ${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: bambu_interface_test${{matrix.simulator}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: bambu_interface_test${{matrix.simulator}}
          path: ${{env.report-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  AXI4-verification:
    needs: [build]
    runs-on: [self-hosted, xilinx]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch AXI test
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          ./panda_regressions/hls/bambu_axi_verification.sh
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  gcc_regression_simple:
    needs: [build, specific-test]
    runs-on: [self-hosted, mentor]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { setup: clang-4.0, script: generic_gcc_regression_simple_eg.sh, args: "-c=--compiler=I386_CLANG4 -c=--simulator=MODELSIM" }
          - { setup: clang-6.0, script: generic_gcc_regression_simple_bambu.sh, args: "-c=--compiler=I386_CLANG6 -c=--simulator=VERILATOR" }
          - { setup: clang-7, script: generic_gcc_regression_simple_bambu.sh, args: "-c=--compiler=I386_CLANG7 -c=--simulator=VERILATOR" }
          - { setup: clang-11, script: generic_gcc_regression_simple_bambu.sh, args: "-c=--compiler=I386_CLANG11 -c=--simulator=VERILATOR" }
          - { setup: clang-13, script: generic_gcc_regression_simple_eg_ext_pipelined.sh, args: "-c=--compiler=I386_CLANG13 -c=--simulator=VERILATOR" }
          - { setup: clang-16, script: generic_gcc_regression_simple_eg_ext_pipelined.sh, args: "-c=--compiler=I386_CLANG16 -c=--simulator=VERILATOR -c=-Wno-int-conversion" }
          - { setup: clang-19, script: generic_gcc_regression_simple_eg_ext_pipelined.sh, args: "-c=--compiler=I386_CLANG19 -c=--simulator=VERILATOR -c=-Wno-int-conversion" }
    env:
      outname: ${{matrix.setup}}_regression_simple
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch GCC regression test suite
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{matrix.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{matrix.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: ${{env.outname}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  gcc_regression_simple-pretty_print:
    needs: [build, specific-test]
    runs-on: [self-hosted]
    env:
      setup: clang-16
      script: generic_gcc_regression_simple_bambu_pretty_print.sh
      args: -c=--compiler=I386_CLANG16 -c=--simulator=VERILATOR -c=--parallel-backend=2
      outname: clang-16_regression_simple-pretty_print
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch GCC regression test suite with pretty-print
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: ${{env.outname}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  gcc_regression_simple-vhdl:
    needs: [build, specific-test]
    runs-on: [self-hosted, mentor]
    env:
      setup: clang-16
      script: generic_gcc_regression_simple_bambu_vhdl.sh
      args: -c=--compiler=I386_CLANG16 -c=--simulator=MODELSIM
      outname: clang16_regression_simple-vhdl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch GCC regression test suite with VHDL target
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: ${{env.outname}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  discrepancy-test:
    needs: [build, specific-test]
    runs-on: [self-hosted]
    env:
      setup: clang-16
      script: generic_discrepancy_eg_bambu.sh
      args: -c=--compiler=I386_CLANG16
      outname: clang-16_discrepancy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch Bambu discrepancy tests
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  softfloat-preliminary:
    needs: [changes]
    if: ${{ needs.changes.outputs.softfloat == 'true' }}
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read host parallelism
        id: host
        shell: bash
        run: |
          echo "jobs=${{env.host_jobs}}" >> "$GITHUB_OUTPUT"
          echo "threads=${{env.host_threads}}" >> "$GITHUB_OUTPUT"
      - name: Verify SoftFloat implementation
        uses: ./.github/actions/base-runner
        with:
          command: ./panda_regressions/hls/test_softfloat.sh
          jobs: ${{ steps.host.outputs.jobs }}
          threads: ${{ steps.host.outputs.threads }}

  softfloat-tests:
    needs: [build, softfloat-preliminary]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs['softfloat-preliminary'].result == 'success' }}
    runs-on: [self-hosted, mentor]
    env:
      script: multi_softfloat-tests.sh
      args: -c=--simulator=VERILATOR -c=--parallel-backend=2
      outname: multi_softfloat-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch SoftFloat test suite
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: ${{env.outname}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

  libm-preliminary:
    needs: [changes]
    if: ${{ needs.changes.outputs.libm == 'true' }}
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Read host parallelism
        id: host
        shell: bash
        run: |
          echo "jobs=${{env.host_jobs}}" >> "$GITHUB_OUTPUT"
          echo "threads=${{env.host_threads}}" >> "$GITHUB_OUTPUT"
      - name: Verify LibM functions implementation
        uses: ./.github/actions/base-runner
        with:
          command: ./panda_regressions/hls/test_libm.sh
          jobs: ${{ steps.host.outputs.jobs }}
          threads: ${{ steps.host.outputs.threads }}

  libm-tests:
    needs: [build, libm-preliminary, softfloat-tests]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs['libm-preliminary'].result != 'failure' && needs['softfloat-tests'].result != 'failure' }}
    runs-on: [self-hosted, mentor]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { setup: clang-4.0, args: "-c=--compiler=I386_CLANG4 -c=--simulator=VERILATOR" }
          - { setup: clang-6.0, args: "-c=--compiler=I386_CLANG6 -c=--simulator=VERILATOR" }
          - { setup: clang-7.0, args: "-c=--compiler=I386_CLANG7 -c=--simulator=VERILATOR" }
          - { setup: clang-11, args: "-c=--compiler=I386_CLANG11 -c=--simulator=MODELSIM" }
          - { setup: clang-13, args: "-c=--compiler=I386_CLANG13 -c=--simulator=VERILATOR" }
          - { setup: clang-16, args: "-c=--compiler=I386_CLANG16 -c=--simulator=VERILATOR" }
          - { setup: clang-19, args: "-c=--compiler=I386_CLANG19 -c=--simulator=MODELSIM" }
    env:
      script: generic_libm-tests.sh
      args: -c=--speculative-sdc-scheduling
      outname: ${{matrix.setup}}_libm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Setup repository + distribution
        uses: ./.github/actions/panda-setup
        with:
          package-name: ${{ needs.build.outputs.package-name }}
          storage-url: ${{ env.storage-url }}
          username: ${{ env.storage-user }}
          password: ${{ env.storage-token }}
          submodules: "false"
      - name: Launch LibM test suite
        id: suite
        shell: bash
        run: |
          source ${{env.dist-dir}}/settings.sh
          mkdir -p ${{env.report-dir}}
          echo "test-reports-dir=$PWD/${{env.report-dir}}" >> $GITHUB_OUTPUT
          ./panda_regressions/hls/${{env.script}} ${{env.NO_CLEAN_ARG}} --returnfail --junitdir="${{env.report-dir}}" --summary="${{env.report-dir}}/perf.xml" ${{matrix.args}} ${{env.args}}
      - name: Collect post-mortem data
        if: ${{ failure() }}
        shell: bash
        run: ./.github/scripts/collect-post-mortem.sh "${{env.report-dir}}" "$GITHUB_JOB" "" "${{env.dist-dir}}"
      - name: Compare results
        id: perf-check
        uses: ./.github/actions/perf-check
        with:
          test-id: ${{env.outname}}
          new-results: ${{env.report-dir}}/perf.xml
          storage-url: "${{env.storage-url}}"
          username: "${{env.storage-user}}"
          password: "${{env.storage-token}}"
      - name: Add performance results
        if: ${{ steps.perf-check.outputs.compare-csv != '' }}
        shell: bash
        run: mv ${{ steps.perf-check.outputs.compare-csv }} ${{env.report-dir}}
      - name: Upload test reports
        id: upload-test-reports
        if: ${{ !cancelled() && env.upload-artifacts == '1' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{env.outname}}
          path: ${{steps.suite.outputs.test-reports-dir}}
      - name: Clean post-mortem workdirs
        if: ${{ !cancelled() && (steps.upload-test-reports.outcome == 'success' || steps.upload-test-reports.outcome == 'skipped') }}
        shell: bash
        run: ./.github/scripts/cleanup-post-mortem-workdirs.sh "${{env.dist-dir}}"

