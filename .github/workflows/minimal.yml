  success:
    if: ${{ !cancelled() }}
    needs:
      - gcc_regression_simple
      - gcc_regression_simple-vhdl
      - gcc_regression_simple-pretty_print
      - interface-test
      - libm-tests
      - discrepancy-test
      - OpenMP-support
      - Make-checks
      - memarch-tests
      - PandA-bench-altera
      - PandA-bench-hw
      - PandA-bench-lattice
      - PandA-bench-nanoxplore
      - PandA-bench-sim
      - PandA-bench-xilinx_vvd
      - PandA-bench-openroad
    runs-on: [self-hosted]
    steps:
      - name: Check 'GCC Regression Simple' status
        if: ${{ needs['gcc_regression_simple'].result != 'success' }}
        run: exit 1
      - name: Check 'GCC Regression Simple VHDL' status
        if: ${{ needs['gcc_regression_simple-vhdl'].result != 'success' }}
        run: exit 1
      - name: Check 'GCC Regression Simple pretty print' status
        if: ${{ needs['gcc_regression_simple-pretty_print'].result != 'success' }}
        run: exit 1
      - name: Check 'Interface Test' status
        if: ${{ needs['interface-test'].result != 'success' }}
        run: exit 1
      - name: Check 'LibM Tests' status
        if: ${{ needs['libm-tests'].result != 'success' }}
        run: exit 1
      - name: Check 'GCC Regression Discrepancy' status
        if: ${{ needs['discrepancy-test'].result != 'success' }}
        run: exit 1
      - name: Check 'OpenMP-support' status
        if: ${{ needs['OpenMP-support'].result != 'success' }}
        run: exit 1
      - name: Check 'Make Checks' status
        if: ${{ needs['Make-checks'].result != 'success' }}
        run: exit 1
      - name: Check 'CHStone memory architecture' status
        if: ${{ needs['memarch-tests'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks (altera)' status
        if: ${{ needs['PandA-bench-altera'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks (hw)' status
        if: ${{ needs['PandA-bench-hw'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks (lattice)' status
        if: ${{ needs['PandA-bench-lattice'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks (nanoxplore)' status
