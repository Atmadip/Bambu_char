        run: exit 1
      - name: Check 'PandA benchmarks (sim)' status
        if: ${{ needs['PandA-bench-sim'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks (xilinx_vvd)' status
        if: ${{ needs['PandA-bench-xilinx_vvd'].result != 'success' }}
        run: exit 1
      - name: Check 'PandA benchmarks for OpenROAD' status
        if: ${{ needs['PandA-bench-openroad'].result != 'success' }}
        run: exit 1
