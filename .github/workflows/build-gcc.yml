name: Build GCC

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "GCC branch reference to compile (e.g.: releases/gcc-5.5.0)"
        required: true
      suffix:
        description: "GCC executable suffix (e.g.: 5)"
        required: true
        type: number
      version:
        description: "GCC release identifier (e.g.: 5.5.0)"
        required: true
        type: string
      configure:
        description: "Build configuration options"
        required: false
        default: "--enable-languages=c,c++,fortran --enable-plugin --enable-multilib --with-multilib-list=m32,m64,mx32 --disable-werror --disable-gcov --disable-nls --with-tune=generic --build=x86_64-linux-gnu --host=x86_64-linux-gnu"
      patch:
        description: "Patch to be applied (if necessary)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - gcc-4.5.patch
          - gcc-4.6.patch
          - gcc-4.7.patch
          - gcc-4.9.patch

concurrency:
  group: build-gcc-${{inputs.version}}
  cancel-in-progress: true

env:
  storage-url: ${{secrets.CI_STORAGE_URL}}
  storage-user: ${{secrets.CI_STORAGE_USER}}
  storage-token: ${{secrets.CI_STORAGE_TOKEN}}
  storage-path: release/compiler
  host_jobs: $J

jobs:
  build:
    runs-on: [self-hosted]
    env:
      dist-name: gcc-${{inputs.version}}-x86_64-linux-gnu-compat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Env setup
        id: host
        shell: bash
        run: |
          echo "Current host supports ${{env.host_jobs}} parallel jobs"
          echo "jobs=${{env.host_jobs}}" >> $GITHUB_OUTPUT
      - name: Set patch
        if: ${{ inputs.patch != '' }}
        shell: bash
        run: |
          cp '.github/actions/build-gcc/${{inputs.patch}}' '${{github.workspace}}'
      - name: Build GCC-${{inputs.version}}
        id: build
        uses: ./.github/actions/build-gcc
        with:
          jobs: ${{steps.host.outputs.jobs}}
          branch: ${{inputs.ref}}
          dist-name: ${{env.dist-name}}
          config-args: ${{inputs.configure}} --with-pkgversion="gcc (Ubuntu ${{inputs.version}}-ubuntu~16.04) ${{inputs.version}}" --program-suffix=-${{inputs.suffix}}
      - name: Upload ${{env.dist-name}}
        shell: bash
        run: |
          DIST_TAR="${{env.dist-name}}.tar.xz"
          STORAGE_URL="${{env.storage-url}}/${{env.storage-path}}/${DIST_TAR}"
          export XZ_OPT='-T0'
          tar -C ${{env.dist-name}} . --mode="u+rwX,g+rwX,o+rX" -cJf ${DIST_TAR}
          curl -L --fail -u '${{env.storage-user}}':'${{env.storage-token}}' -T "${DIST_TAR}" "$STORAGE_URL"
          echo "### New release available at https://release.bambuhls.eu/compiler/${DIST_TAR}" >> $GITHUB_STEP_SUMMARY
