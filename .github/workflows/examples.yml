name: Examples synthesis

on:
  workflow_dispatch:
    inputs:
      package-name:
        description: "Bambu AppImage name"
        required: false
        type: string
        default: bambu-examples
      compilers:
        description: "Front-end compiler string"
        required: false
        type: string
        default: clang-4.0
      configure:
        description: "Bambu build configuration arguments"
        required: false
        type: string
        default: --enable-opt --with-opt-level=2 --enable-release
      test-compiler:
        description: "Compiler used during tests"
        required: false
        type: string
        default: I386_CLANG4

jobs:
  build:
    uses: ./.github/workflows/build-panda.yml
    with:
      package-name: ${{inputs.package-name}}
      compilers: ${{ inputs.compilers }}
      configure: ${{ inputs.configure }}
    secrets: inherit

  test-suite:
    uses: ./.github/workflows/reusable-examples.yml
    with:
      package-name: ${{needs.build.outputs.package-name}}
      test-compiler: ${{inputs.test-compiler}}
    secrets: inherit

  success:
    if: ${{ !cancelled() }}
    needs: [test-suite]
    runs-on: [self-hosted]
    steps:
      - name: Check test suite status
        if: ${{ needs.test-suite.result != 'success' }}
        run: exit 1
