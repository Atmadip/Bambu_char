name: Build LLVM

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "LLVM branch reference to compile (e.g.: llvmorg-16.0.6)"
        required: true
      version:
        description: "Compiled LLVM version number (e.g.: 16.0.6)"
        required: true
      configure:
        description: "Build configuration options"
        required: false
        default: -DLLVM_ENABLE_PROJECTS="clang" -DLLVM_TARGETS_TO_BUILD=X86 -DCMAKE_BUILD_TYPE=Release -DLLVM_STATIC_LINK_CXX_STDLIB=ON
      patch:
        description: "Patch to be applied (if necessary)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - llvmorg-4.0.1.patch
          - llvmorg-5.0.2.patch
          - llvmorg-19.1.5.patch

concurrency:
  group: build-llvm-${{ inputs.version }}
  cancel-in-progress: true

env:
  storage-url: ${{secrets.CI_STORAGE_URL}}
  storage-user: ${{secrets.CI_STORAGE_USER}}
  storage-token: ${{secrets.CI_STORAGE_TOKEN}}
  storage-path: release/compiler
  host_jobs: $J

jobs:
  build:
    runs-on: [self-hosted]
    env:
      dist-name: clang+llvm-${{inputs.version}}-x86_64-linux-gnu-compat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Env setup
        id: host
        shell: bash
        run: |
          echo "Current host supports ${{env.host_jobs}} parallel jobs"
          echo "jobs=${{env.host_jobs}}" >> $GITHUB_OUTPUT
      - name: Set patch
        if: ${{ inputs.patch != '' }}
        shell: bash
        run: |
          cp '.github/actions/build-llvm/${{inputs.patch}}' '${{github.workspace}}'
      - name: Build LLVM ${{inputs.version}}
        id: build
        uses: ./.github/actions/build-llvm
        with:
          jobs: ${{steps.host.outputs.jobs}}
          branch: ${{inputs.ref}}
          dist-name: ${{env.dist-name}}
          config-args: ${{inputs.configure}}
      - name: Upload LLVM ${{env.dist-name}}
        shell: bash
        run: |
          DIST_TAR="${{env.dist-name}}.tar.xz"
          STORAGE_URL="${{env.storage-url}}/${{env.storage-path}}/${DIST_TAR}"
          export XZ_OPT='-T0'
          tar -C ${{env.dist-name}} . --mode="u+rwX,g+rwX,o+rX" -cJf ${DIST_TAR}
          curl -L --fail -u '${{env.storage-user}}':'${{env.storage-token}}' -T "${DIST_TAR}" "$STORAGE_URL"
          echo "### New release available at https://release.bambuhls.eu/compiler/${DIST_TAR}" >> $GITHUB_STEP_SUMMARY
