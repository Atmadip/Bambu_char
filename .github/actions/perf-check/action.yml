name: Performance check
description: Check performance against base branch results
inputs:
  test-id:
    description: "Test id"
    required: true
  new-results:
    description: "New xml results file name"
    required: true
  datapoints:
    description: "Datapoints to compare"
    required: false
    default: "CYCLES"
  score:
    description: "Socre multiplier for each datapoint"
    required: false
    default: ""
  storage-url:
    description: "Url of private storage"
    required: true
  username:
    description: "Username for private storage access"
    required: false
    default: ""
  password:
    description: "Password for private storage access"
    required: false
    default: ""
outputs:
  compare-xml:
    description: "Compare output xml file"
    value: ${{ steps.cmp.outputs.outxml }}
runs:
  using: "composite"
  steps:
    - name: Upload test results from current branch
      shell: bash
      run: |
        set -e
        PKG_URL="${{inputs.storage-url}}/results/${{github.head_ref}}/${{inputs.test-id}}.xml"
        CURL_CMD=""
        if [[ ! -z '${{inputs.username}}' ]]; then
          CURL_CMD+='-u ${{inputs.username}}:${{inputs.password}} '
        fi
        if [[ -f "${{inputs.new-results}}" ]]; then
          curl -s -L --fail $CURL_CMD -T "${{inputs.new-results}}" "$PKG_URL"
          echo "Package successfully uploaded to $PKG_URL"
        else
          echo "Path '${{inputs.new-results}}' does not name a file or directory"
          exit -1;
        fi
    - name: Compare against ${{github.base_ref}}
      id: cmp
      shell: bash
      run: |
        set -e
        PKG_URL="${{inputs.storage-url}}/results/${{github.base_ref}}/${{inputs.test-id}}.xml"
        COMMIT_SHA="${{github.sha}}"
        COMPARE_XML="${{inputs.test-id}}.$(echo '${{github.head_ref}}' | sed 's/\//_/g')_${COMMIT_SHA:0:7}.xml"
        score="${{ inputs.score }}"
        outxml=""
        CURL_CMD=""
        if [[ ! -z '${{inputs.username}}' ]]; then
          CURL_CMD+='-u ${{inputs.username}}:${{inputs.password}} '
        fi
        mkdir -p perf-reports
        if curl -s -L --fail $CURL_CMD $PKG_URL -o perf-reports/${{inputs.test-id}}.xml; then
          worse_count=$(python ./etc/scripts/hawk.py -d ${{inputs.datapoints}} ${score:+-s }${score} -o $COMPARE_XML "perf-reports/${{inputs.test-id}}.xml" "${{inputs.new-results}}" 3>&2 2>&1 1>&3)
          if [[ "$worse_count" == "-1" ]]; then
            echo "::warning:: Benchmark suite is different from ${{github.base_ref}}"
          elif [[ "$worse_count" != "0" ]]; then
            outxml="$COMPARE_XML"
            echo "::warning:: Performance are worse with respect to ${{github.base_ref}} for ${{inputs.test-id}}: $worse_count benchmarks have degraded performance"
          fi
        else
          echo "::warning:: No previous benchmark result found to compare"
        fi
        echo "outxml=$outxml" >> $GITHUB_OUTPUT
        exit 0
